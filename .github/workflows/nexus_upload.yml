name: Upload To Nexus

on:
  release:
    types: [released]
  workflow_dispatch:

jobs:
  # This workflow is its own run, so it cannot reach compile.yml's artifacts:
  # it builds the checkers it needs. Three arches, since the publish steps
  # below cover Windows, Linux and OSX from the one job. Only momi-gml-check
  # is built: momi-gml-probe executes GML and never ships.
  checker:

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: win-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - arch: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - arch: osx-x64
            os: macos-latest
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - name: Add the Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Build momi-gml-check
        run: cargo build --release --manifest-path tools/checker/Cargo.toml --target ${{ matrix.target }} --bin momi-gml-check
      - name: Upload the ${{ matrix.arch }} checker
        uses: actions/upload-artifact@v4
        with:
          name: checker-${{ matrix.arch }}
          path: tools/checker/target/${{ matrix.target }}/release/momi-gml-check*
          if-no-files-found: error

  nexus_upload:
    needs: checker

    strategy:
      fail-fast: false
      matrix:
        project: [ModsOfMistriaGUI]
        arch: [win-x64]
        os: [windows]
        configuration: [Release]

    runs-on: ubuntu-latest
    environment: NEXUS_TOKEN

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Download the checkers
        uses: actions/download-artifact@v4
        with:
          pattern: checker-*
          path: tools/checker/staged
      - name: Lay the checkers out per RID
        run: |
          for arch in win-x64 linux-x64 osx-x64; do
            mkdir -p tools/checker/dist/$arch
            cp tools/checker/staged/checker-$arch/momi-gml-check* tools/checker/dist/$arch/
          done
          ls -lR tools/checker/dist

      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build
      - name: Test
        run: dotnet test

      - name: Get Assembly Version
        run: |
          VERSION=$(dotnet msbuild -nologo -verbosity:quiet -getProperty:AssemblyVersion ModsOfMistriaGUI)
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
        
      - name: Compile Windows
        run: dotnet publish ModsOfMistriaGUI -c Release -r win-x64 -o Release
          
      - name: Compile Linux
        run: dotnet publish ModsOfMistriaGUI -c Release -r linux-x64 -o Release
      - name: Zip Linux
        uses: vimtor/action-zip@v1.3
        with:
          files: Release/ModsOfMistriaInstaller-linux
          dest: Release/ModsOfMistriaInstaller-linux.zip
          
      - name: Compile OSX
        run: dotnet publish ModsOfMistriaGUI -c Release -r osx-x64 -o Release
      - name: Zip OSX
        uses: vimtor/action-zip@v1.3
        with:
          files: Release/ModsOfMistriaInstaller-osx
          dest: Release/ModsOfMistriaInstaller-osx.zip
          
      - name: Upload to Windows GUI NexusMods
        uses: Nexus-Mods/upload-action@v1.0.0-beta.4
        with:
          api_key: ${{ secrets.NEXUS_TOKEN }}
          file_group_id: 569647
          filename: Release/ModsOfMistriaInstaller.exe
          version: ${{ env.APP_VERSION }}
          display_name: "Mods Of Mistria Installer"
          description: "If you're on Windows, you should probably use this release"
          
      - name: Upload to Linux GUI NexusMods
        uses: Nexus-Mods/upload-action@v1.0.0-beta.4
        with:
          api_key: ${{ secrets.NEXUS_TOKEN }}
          file_group_id: 569653
          filename: Release/ModsOfMistriaInstaller-linux.zip
          version: ${{ env.APP_VERSION }}
          display_name: "Mods Of Mistria Installer Linux"
          description: "If you're on a Steam Deck, you should probably use this release"

      - name: Upload to OSX GUI NexusMods
        uses: Nexus-Mods/upload-action@v1.0.0-beta.4
        with:
          api_key: ${{ secrets.NEXUS_TOKEN }}
          file_group_id: 569668
          filename: Release/ModsOfMistriaInstaller-osx.zip
          version: ${{ env.APP_VERSION }}
          display_name: "Mods Of Mistria Installer OSX"
          description: "If you're on a Mac, you should probably use this release"