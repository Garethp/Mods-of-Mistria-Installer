name: Publish To Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # The GML checker is native, so it builds on a runner matching its target
  # rather than riding the .NET publish's cross-compile. Only momi-gml-check is
  # built and uploaded here: momi-gml-probe executes GML and never ships.
  checker:

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: win-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - arch: win-x86
            os: windows-latest
            target: i686-pc-windows-msvc
          - arch: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - arch: osx-x64
            os: macos-latest
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - name: Add the Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Build momi-gml-check
        run: cargo build --release --manifest-path tools/checker/Cargo.toml --target ${{ matrix.target }} --bin momi-gml-check
      - name: Upload the ${{ matrix.arch }} checker
        uses: actions/upload-artifact@v4
        with:
          name: checker-${{ matrix.arch }}
          path: tools/checker/target/${{ matrix.target }}/release/momi-gml-check*
          if-no-files-found: error

  compile:
    needs: checker

    strategy:
      fail-fast: false
      matrix:
        project: [ModsOfMistriaCommandLine, ModsOfMistriaGUI]
        arch: [linux-x64, win-x64, win-x86, osx-x64]
        os: [windows]
        configuration: [Release]

    runs-on: ubuntu-latest
    environment: NEXUS_TOKEN

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Download the ${{ matrix.arch }} checker
        uses: actions/download-artifact@v4
        with:
          name: checker-${{ matrix.arch }}
          path: tools/checker/dist/${{ matrix.arch }}
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build
      - name: Test
        run: dotnet test
      - name: Publish ${{ matrix.arch }} CLI
        run: dotnet publish ${{ matrix.project }} -c ${{ matrix.configuration }} -r ${{ matrix.arch }} -o Release
      - name: Upload binaries to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          ls -l Release
          gh release upload ${{ github.ref_name }} Release/*
