# The single funnel every executed shared-FSM transition routes through: the
# deferred path (new_tick) and the instant path (change_state_instant) both
# land in execute_state_change(); the initial state at spawn bypasses it via
# begin_new_state. Dispatch happens before the outgoing state's stop() so stop
# handlers that read fsm.next_state see the post-filter destination. A cancel
# clears next_state and returns early; new_tick's boolean return is consumed
# nowhere in pristine, so the early return is safe. A redirect is bounds- and
# integer-checked because List.get() asserts out of range and every id in
# [0, count) is a defined state at spawn. execute_state_change is a
