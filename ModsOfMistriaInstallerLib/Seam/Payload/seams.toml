# The mmapi v2 seam catalog: the hook declarations and the anchored engine edits
# that wire the named-hook API into the game. Each [[hook]] declares one named
# hook once: its kind, its contract, and (provider = "runtime") whether the
# framework itself emits it with no seam behind it. Each [[seam]] is an engine
# edit whose injected dispatch calls one of mmapi_emit, mmapi_apply_filters,
# mmapi_check_guards, or mmapi_run_override. The guard convention is uniform:
# a guard handler returns false to veto, and with zero handlers every seam is
# byte-equivalent to pristine behavior.
#
# A seam comes in two forms. The TEXT form states `anchor` + `replace` verbatim
# and names the hooks it feeds in `provides`; it carries the edits a template
# cannot say (control-flow rewrites, value capture, argument threading). The
# TEMPLATE form states a locator plus an op (emit, guard, filter, filter_call,
# ctx_filter, wrap), and the injected dispatch is generated with the uniform
# try/catch shape (see mistweave/dispatch.py); provides derives from its
# `hook`. The locator is either pristine context stated once
# (context_before/context_after, whose concatenation is the anchor) or a
# structural `target` (fn + at + token anchor, matched token-wise inside the
# named function, immune to whitespace and comment drift). A wrap targets a
# whole function: the pristine definition is renamed, body untouched, and a
# generated wrapper filters its return value; with zero handlers a wrap is
# behaviorally (not byte-) equivalent to pristine.
# Anchors are matched after normalizing \r\n to \n.
# Apply order is catalog order plus `depends_on` edges (topo-sorted, stable).
# Hook-less edits live in [[engine_fix]]: game_step_begin_installs (the mmapi
# lifecycle root) and shroom_puddle_mask (a beta-wiring fix).

version = 2

# --- hook declarations -------------------------------------------------------------

[[hook]]
name = "animal.heart_points"
kind = "filter"
doc  = "Fires at the top of Animal.add_heart_points(), before the delta is applied. The filtered value is the heart points delta. ctx is the Animal struct. Return the replacement value, or undefined to keep the current value."

[[hook]]
name = "camera.culls_processed"
kind = "event"
doc  = "Fires at the end of Camera.process_culls(), immediately after instance_activate_region() has deactivated all node renderers (obj_node_renderer / obj_assetobject) and reactivated only the ones inside the cull region, i.e. after off-screen instances that just scrolled into view are active again and before the frame draws. ctx is the Camera struct. Fires every frame culling runs for the room. Observation only. The intended use is to re-apply per-instance sprite/visual state to the just-reactivated renderers before they draw, so a mod's sprite override does not lag a frame on scroll-in. A reactivated instance carries its last sprite_index, which the mmapi begin_step tick (running before this cull at Game.gml step_begin) cannot have refreshed yet."

[[hook]]
name = "animal.pet"
kind = "event"
doc  = "Fires when the player pets a barn/coop animal (top of obj_player_animal on_pet()) or puts a held animal down (end of put_down()). ctx is the obj_player_animal instance, not the Animal data struct: its Animal data is ctx.me, and ctx.create_animal_currency_dance(count, face_ari) plays the celebration that drops count AnimalCurrency 'beads' at this animal (itself a no-op unless Perk.CurrencyOfCare is active). Observation only. The two call sites share one hook, so a handler that wants once-per-day (or once-per-animal) behavior must latch itself. The on_pet site fires before the animal's own can_pet() gate, so it can fire even when the pet turns out to be a no-op."

[[hook]]
name = "npc.heart_points"
kind = "filter"
doc  = "Fires at the top of Npc.add_heart_points(), before the delta is applied. The filtered value is the heart points delta (amount). ctx is the Npc struct. Return the replacement value, or undefined to keep the current value. Distinct from animal.heart_points, which covers barn animals rather than villagers."

[[hook]]
name = "audio.music_selector"
kind = "filter"
doc  = "Fires in the scene music selector when the dungeon biome track is chosen (standard dungeon rooms, and only when the runner is not blocking music). The filtered value is the biome music track. ctx is undefined. Return the replacement track, or undefined to keep the current value."

[[hook]]
name = "audio.play_guard"
kind = "guard"
doc  = "Fires at the top of TANGO.play(asset_name, ...), before a sound effect starts. ctx is { asset_name }. Return false to suppress the sound (play returns undefined); undefined or true allows. Runs for every SFX the game plays through TANGO, so keep handlers cheap."

[[hook]]
name = "crafting.max_crafts"
kind = "override"
contention = "exclusive"
doc  = "Fires at the top of CraftingMenu.maximum_crafts(item), the ceiling on how many of a recipe can be crafted (check_item_craftable derives from it, so this also gates craftability). ctx is { menu, item }; read ctx.menu.context for the crafting discipline. Return a replacement count (e.g. a large number to allow crafting without materials), or undefined to defer to the normal material-based computation."

[[hook]]
name = "crafting.pay_component_costs"
kind = "guard"
doc  = "Fires at the top of pay_component_costs(components, item_id, quantity, context), before a recipe's materials are deducted. ctx is { item_id, quantity, context } (context is the crafting discipline). Return false to skip the payment (craft for free); undefined or true pays normally."

[[hook]]
name = "npc.gift_received"
kind = "event"
doc  = "Fires at the top of par_NPC.receive_gift(item), when the player gives an NPC a gift, before the NPC's give_gift bookkeeping. ctx is { npc, item }: npc is the NPC instance, item is the gifted item. Observation only."

[[hook]]
name = "gossip.selections"
kind = "filter"
doc  = "Fires at the return of get_gossip_selections(), the NPCs offered for the day's gossip. The filtered value is that selection list. ctx is undefined. Return a replacement list (for example an empty list to suppress gossip), or undefined to keep the current value."

[[hook]]
name = "combat.damage"
kind = "filter"
doc  = "Fires in the obj_damage_receiver drain loop, after iframe and rockstack checks and before the hit resolves. The filtered value is the damage tarball instance. ctx is the receiver. Return the replacement tarball or undefined to keep the current one. The seam skips the hit if the tarball comes back destroyed, and fields set on the tarball here are read later by the player.incoming_damage seam. Hits injected via mmapi_deal_damage() carry __mmapi_injected with the injecting mod's name; engine hits do not."

[[hook]]
name = "combat.damage_injected"
kind = "event"
provider = "runtime"
doc  = "Fires from mmapi_deal_damage() right after a receiver accepts a synthetic hit (it has passed the receiver's target-mask and iframe enqueue checks but has not resolved yet). ctx is { receiver, tarball, mod_name }. Observation only: the injected hit still flows through combat.damage and combat.damage_resolved like any engine hit, and the tarball carries __mmapi_injected with the injecting mod's name so combat.damage filters can tell synthetic hits from engine hits."

[[hook]]
name = "combat.damage_resolved"
kind = "event"
doc  = "Fires after a hit resolves against a damage receiver: successful hits (Normal, DamageOnAttack, and in-air Aerial) and blocks. ctx is { receiver, tarball, status, successful }; successful is true for a landed hit, false for a block."

[[hook]]
name = "combat.tarball_grid"
kind = "filter"
in_place = true
doc  = "Fires at the top of obj_damage_tarball's step, inside the if self.can_hurt block and before the grid pick/chop/destroy blocks (pick at obj_damage_tarball.gml:168, chop at :209, destroy at :231) and the receiver-collision enqueue (:253). The filtered value is the tarball instance. A handler mutates it in place, setting can_pick_grid_objects / can_chop_grid_objects / can_destroy_grid_objects so the swing forages / chops / destroys grid nodes that same frame (these flags are what the pick/chop/destroy blocks read). The return is discarded (an in-place filter, the ui.item_node shape): mutate the tarball, do not build a replacement. Guard on the tarball's target (CombatTarget.Player is an incoming hit on the player) and provenance before acting. Hot path (every active can_hurt tarball, every unpaused frame). Keep handlers cheap."

[[hook]]
name = "object.interact"
kind = "override"
contention = "claim-scoped"
doc  = "Fires at the top of interact(node) (Interact.gml, the shared grid-object interaction dispatcher), before can_interact. ctx is the grid node being interacted with (read node.object_id, node.prototype, node.top_left_x/y, node.renderer). Return a non-undefined value to replace the interaction entirely: the engine's interact for this node is skipped and your value becomes interact's return (return true for a handled interaction). Return undefined to defer to the engine's normal handling. This gives a mod's placed furniture custom interact behavior, since the engine dispatches every furniture interaction through this one function."

[[hook]]
name = "furniture.place_guard"
kind = "guard"
doc  = "Fires at the top of write_furniture_to_location(grid, xx, yy, proto, stack_count, rotation), before the placement is validated or written. ctx is { grid, x, y, proto, stack_count, rotation }; proto is the furniture NODE_PROTOTYPE (proto.object_id identifies which furniture). Return false to veto the placement (write_furniture_to_location returns undefined, so nothing is placed and the item stays in hand); undefined or true allows. stack_count > 0 indicates a recursive child-grid placement (furniture on furniture). Use it to cap or forbid placing a mod's furniture under mod-specific conditions."

[[hook]]
name = "dialogue.line"
kind = "filter"
doc  = "Fires in ConversationDriver.deliver_line(), before the textbox shows the line. The filtered value is the localized line text. ctx is { driver, line, conversation_name, npc_id, is_info_line }. Return the replacement string, or undefined to keep the current value."

[[hook]]
name = "dialogue.npc_blip"
kind = "filter"
doc  = "Fires in the NpcSpeaker constructor, after the default blip noise lookup. The filtered value is the blip sound. ctx is { npc_id, speaker }. Return the replacement sound, or undefined to keep the current value."

[[hook]]
name = "dialogue.path"
kind = "filter"
doc  = "Fires at the top of play_conversation(), after dialogue.play_guard. The filtered value is the struct { npc_id, path, close_callback, args }. ctx is undefined. Return the replacement struct. The seam tolerates an undefined return and re-reads every field defensively, so undefined (or a partial struct) keeps the engine values."

[[hook]]
name = "dialogue.play_guard"
kind = "guard"
doc  = "Fires at the top of play_conversation(), before dialogue.path runs. ctx is { npc_id, path, close_callback, args }. Return false to veto the conversation (play_conversation returns undefined). Undefined or true allows."

[[hook]]
name = "dialogue.speaker"
kind = "filter"
doc  = "Fires in the T2 Speaker action handler when a textbox speaker is built. The filtered value is the NpcSpeaker or CameoSpeaker about to be assigned. ctx is { action, current_npc_id, driver, conversation_name, textbox, is_cameo }. The engine threads the ConversationDriver through for mid-conversation actions, and a companion seam (which dispatches nothing itself) threads it for the conversation's initial speaker too, so driver and conversation_name are filled whenever a conversation is playing. Return the replacement speaker, or undefined to keep the current value."

[[hook]]
name = "dungeon.floor_built"
kind = "event"
doc  = "Fires in the dungeon floor entry bracket, right after build_dungeon_room() and before the runner's room start. ctx is { runner, floor, biome, room_id, grid, level, gm_room, impl }, each field filled best-effort."

[[hook]]
name = "dungeon.floor_enter"
kind = "event"
doc  = "Fires in the dungeon floor entry bracket, before dungeon.room_build_begin and build_dungeon_room(). ctx is { runner, floor, biome, room_id, grid, level, gm_room, impl }, each field filled best-effort."

[[hook]]
name = "dungeon.ladder_spawn"
kind = "guard"
doc  = "Fires at the top of DungeonRunner.spawn_ladder(). ctx is { runner, x, y } in tile coordinates. Return false to veto the ladder spawn. Undefined or true allows."

[[hook]]
name = "dungeon.room_build_begin"
kind = "event"
doc  = "Fires immediately before build_dungeon_room(), right after dungeon.floor_enter with the same ctx. ctx is { runner, floor, biome, room_id, grid, level, gm_room, impl }, each field filled best-effort."

[[hook]]
name = "dungeon.runner_created"
kind = "event"
doc  = "Fires in enter_dungeon() after DUNGEON_RUNNER is constructed, before the goto to the first level's room. ctx is { runner, floor, biome, room_id, grid, level, gm_room, impl }, each field filled best-effort."

[[hook]]
name = "dungeon.treasure_chest"
kind = "event"
doc  = "Fires in the dungeon breakables logic when a treasure chest starts its drop chain. ctx is { node, object_id, x, y }, with x and y read from the node renderer."

[[hook]]
name = "dungeon.side_room_chance"
kind = "filter"
doc  = "Filters the spawn chance passed to try_create_side_room() at the head of that function, before the per-floor roll. ctx is { impl, is_ritual, max_flr }; is_ritual is true when impl == DungeonImpl.Ritual (the pre-computed convenience flag so consumers need not reference the DungeonImpl enum). Return an adjusted chance (0-100) to raise/lower the odds of a treasure/ritual side room; return the value unchanged (or undefined) to defer. Fires for every side-room impl the runner attempts."

[[hook]]
name = "fsm.transition"
kind = "filter"
doc  = "Fires in __StateMachine.execute_state_change(), once per executed state transition of every shared-FSM machine in the game (monsters, the player and the fishing sub-machine, NPCs, animals, birds, fish and fish schools, the camera, cameos, the bobber), before the outgoing state's stop() runs. The filtered value is the struct { fsm, owner, from, to, cancel: false }: fsm is the machine, owner is whatever spawn() received (an instance for monsters, NPCs, and the player; a struct for the camera and the fishing sub-machine, so check is_struct before touching instance fields), from and to are the machine's per-species enum state ids (CatState.*, TomeState.*, MushroomState.*, PlayerState.*, and so on, resolvable by name in mod GML). Return the replacement struct, or mutate it in place and return undefined; the seam re-reads fields defensively. Set cancel to true to skip the transition entirely (no stop or start runs, the machine keeps its state, and state_frame stalls for that tick); set to to a different valid state id of the same machine to redirect (non-numeric, fractional, or out-of-range values are ignored). Redirect via the struct, never by calling change_state from inside a handler. The initial state entered at spawn does not dispatch. Deferred requests overwritten before new_tick never dispatch. A cancelled transition that the owner re-requests every step re-dispatches every tick for that instance while the cancel holds. Transitions are edge events, not per-frame."

[[hook]]
name = "game.clock_tick"
kind = "event"
doc  = "Fires at the top of Clock.update() every frame, before game seconds are buffered. ctx is the Clock struct. Fires even while the game is paused or time is stopped."

[[hook]]
name = "clock.time_advance"
kind = "filter"
doc  = "Fires inside Clock.update() each frame, after the natural per-frame time advance is computed (GAME_SECONDS_PER_FRAME, already gated by game_paused() and the clock's time_stopped) and before it is buffered into side_buffer. The filtered value is the game-seconds the clock is about to advance this frame; ctx is the Clock. Return 0 to freeze the advance this frame (for example while the player is indoors), a replacement amount, or undefined to keep the natural advance. Suppressing the advance here does not touch time_stopped, so it composes with the engine's own freezes (end-of-day menu, cutscenes, challenge floors) instead of fighting them."

[[hook]]
name = "game.day_started"
kind = "event"
provider = "runtime"
doc  = "Fires from the begin_step derived-events poll when total_days() changes. ctx is { total_days }. Observation only: the day has already started, and the first poll of a session only records the baseline."

[[hook]]
name = "game.room_changed"
kind = "event"
provider = "runtime"
doc  = "Fires from the begin_step derived-events poll when room() changes, after room_start has already run. ctx is { previous, current } (gm_room values). Observation only: to change room content as it loads, use the in-file seams (dungeon.floor_enter and the room transition events) instead."

[[hook]]
name = "game.room_transition_post"
kind = "event"
doc  = "Fires at the end of the taxi transition, after arrival and music selection. ctx is the same struct as game.room_transition_pre ({ taxi, itinerary, from_room, to_room, gm_room, instant }), with itinerary, to_room, gm_room, and instant re-read from the live itinerary just before the emit."

[[hook]]
name = "game.room_transition_pre"
kind = "event"
doc  = "Fires at the top of Taxi.taxi_player(), before the transition starts. ctx is { taxi, itinerary, from_room, to_room, gm_room, instant }. After the emit the seam writes ctx.itinerary, ctx.gm_room, and ctx.instant back onto the itinerary and recomputes its destination, so a handler can mutate the ctx to redirect the transition."

[[hook]]
name = "game.save_guard"
kind = "guard"
doc  = "Fires at the top of save_game(), before the saver is created. ctx is { save_path }. Return false to veto the save. Undefined or true allows."

[[hook]]
name = "game.title_entered"
kind = "event"
provider = "runtime"
doc  = "Fires from the begin_step derived-events poll when the room changes into the title/menu room from a non-title room. ctx is {} (empty struct). Observation only. Fires after game.room_changed for the same room change."

[[hook]]
name = "input.check_value_id"
kind = "filter"
doc  = "Fires at the top of Input.check_value(). The filtered value is the input_id being checked. ctx is undefined. Return a replacement input id to remap the lookup, or undefined to keep the current value."

[[hook]]
name = "input.take_press"
kind = "guard"
doc  = "Fires in par_interactable when a registered interaction's input reads as pressed, before the interaction runs. ctx is { subject, input_id, local_key, interaction }. Return false to veto the press (a force_press still goes through). Undefined or true allows."

[[hook]]
name = "interact.elevator_action"
kind = "guard"
doc  = "Fires when the player actually activates the dungeon elevator (the interaction action, not the per-frame interactability poll). ctx is { subject, key: \"dungeon_elevator\" }. Return false to veto opening the elevator menu. Undefined or true allows."

[[hook]]
name = "interact.ladder_down_action"
kind = "guard"
doc  = "Fires when the player activates a dungeon ladder to descend, before the descend sound and floor change. ctx is { subject, key: \"dungeon_ladder_down\" }. Return false to veto the descent. Undefined or true allows."

[[hook]]
name = "item.display_description"
kind = "filter"
doc  = "Fires at the return of LiveItem.get_display_description(), the string the tooltip body actually renders. The filtered value is the description string. ctx is { item }. Return the replacement string, or undefined to keep the current value."

[[hook]]
name = "items.consumed"
kind = "event"
doc  = "Fires after the player eats an item, right after the items_eaten stat is recorded. ctx is the consumed LiveItem."

[[hook]]
name = "items.dig_artifact"
kind = "filter"
doc  = "Fires at the return of Archaeology.choose_random_artifact(), the artifact an archaeology dig spot yields (overworld locations and dungeon biomes both route through it). The filtered value is the chosen artifact item id. ctx is the Archaeology struct. Return the replacement item id, or undefined to keep the current value."

[[hook]]
name = "items.dropped"
kind = "event"
doc  = "Fires in drop_item() before the dropped items spawn into the world. ctx is { value, items, x, y, z_offset }, where items is the array of items to drop and value is the original drop argument."

[[hook]]
name = "items.trashed"
kind = "event"
doc  = "Fires when the player trashes the item in hand slot 0 via a trash button: the inventory trash button (PlayerMenu, the journal inventory) or the storage trash button (StorageMenu, chests). It fires at the top of the button's tap callback, before the slot pop()/drain() removes the item(s). ctx is { item, count }: item is the LiveItem in hand slot 0 (the item being trashed; undefined if the slot is somehow empty), and count is how many units this tap trashes (the whole stack when Shift-trashing via drain, else 1). This is the real trash signal: the generic slot pop()/drain() are shared by every inventory move, so only these two trash-button callbacks distinguish a trash from an ordinary slot operation (the game itself marks them with the SoundEffects/UI/UITrashItem tap sound). An event: the trash still happens; use it to react (e.g. pay out the trashed item's value)."

[[hook]]
name = "items.give"
kind = "filter"
doc  = "Fires at the top of give_item(), after the item is coerced to a LiveItem. The filtered value is the struct { item, item_id, count, show_toast, show_new_popup, play_sound }. ctx is the player. Return the replacement struct. The seam tolerates an undefined return and re-reads each field defensively (item_id is informational and is not read back)."

[[hook]]
name = "items.infusion_generate"
kind = "guard"
doc  = "Fires at the top of Recipe.generate_infusions(). ctx is the recipe struct. Return false to veto infusion generation (an empty list is returned). Undefined or true allows."

[[hook]]
name = "items.treasure_distribution"
kind = "filter"
doc  = "Fires at both exits of the dungeon treasure distribution roll: once when the roll produced no candidate and once on the rolled result. The filtered value is [live_item, is_perk], or undefined in the no-candidate case. ctx is { x, y }. Return a replacement [live_item, is_perk] array (in the no-candidate case this injects a drop where there was none), or undefined to keep the current value."

[[hook]]
name = "items.use_guard"
kind = "guard"
doc  = "Fires at the top of use_item(), after the item is coerced to a LiveItem and before any use logic. ctx is the LiveItem being used. Return false to veto the use (use_item returns false). Undefined or true allows."

[[hook]]
name = "local.get"
kind = "filter"
doc  = "Fires on every engine localization lookup: the localizer (local_get) is a native builtin with no GML body, so the framework token-rewrites every GML local_get() call site through mmapi_local_get(), the one GML point that sees every lookup (static UI via Node.set_key, dialogue via the Mist __get_localization_value binding and the textbox, toasts, the {Local} format specifier, item names and descriptions). The filtered value is the resolved text, after the local.missing chain has run on a miss; ctx is the lookup key exactly as the engine passed it (usually a key string like \"misc_local/warning\", but local_wrap()-wrapped raw text and non-string values pass through here too, so exact-match the keys you own and return undefined otherwise). Return the replacement string; return undefined to keep the current value. Resolved UI text is cached on the text node (Node.set_key early-outs on an unchanged key) and re-resolves through this hook on language change, so lookups run at interaction and menu-build frequency with bursts when list menus build. Keep handlers cheap, and prefer language-aware text (local_language()) since debug validators temporarily force eng."

[[hook]]
name = "local.missing"
kind = "filter"
doc  = "Fires inside mmapi_local_get() only when the native localizer misses: local_get() returned undefined, echoed the key back, or returned the engine's \"MISSING\" sentinel (\"PLACEHOLDER\" is a hit: the key exists with pending text). The filtered value starts undefined; ctx is { key, fallback }, fallback being what the engine would have surfaced. Return the text to inject for keys the base game lacks (computed strings, or fail-soft for keys that should have shipped as data); return undefined to keep the engine fallback unchanged. Filter, not override, on purpose: many mods legitimately register here, each owning its key prefix, and later filters see earlier injections. Static keys should ship as localization data through the normal registration path; this hook is the runtime complement, and the ctx struct is only allocated on the miss path."

[[hook]]
name = "monster.death"
kind = "event"
doc  = "Fires when a monster dies, just before its instance is destroyed. ctx is { monster, monster_id, x, y }."

[[hook]]
name = "monster.draw"
kind = "event"
doc  = "Fires at the end of par_monster's draw() method, after the monster sprite and its status overlays (venom/frozen) are drawn, once per visible monster per frame in the world-draw pass. ctx is the monster instance: read x, y, z, health, and so on, and draw in world space (e.g. a health bar on top). Observation only. Hot path (every visible monster, every frame). Keep handlers cheap."

[[hook]]
name = "monster.shroom.should_hide"
kind = "guard"
doc  = "Fires at the top of the shroom monster's should_hide() check. ctx is the shroom instance. Return false to veto hiding (should_hide returns false); undefined or true falls through to the normal distance check."

[[hook]]
name = "monster.spawn"
kind = "filter"
doc  = "Fires at the top of spawn_monster(). The filtered value is the struct { x, y, monster_id, cancel: false }. ctx is undefined. Return the replacement struct: a handler can set cancel to true to suppress the spawn (spawn_monster returns undefined) or change x, y, and monster_id to move or replace the spawn. The seam tolerates an undefined return and re-reads fields defensively."

[[hook]]
name = "monster.spirit_projectile.step"
kind = "guard"
doc  = "Fires each step of a spirit projectile. ctx is the projectile instance. Return false to veto the step and destroy the projectile. Undefined or true allows."

[[hook]]
name = "monster.step_begin"
kind = "event"
doc  = "Fires every frame for every monster in par_monster's begin step, right after the aggro update. ctx is the monster instance. Hot path. Keep handlers cheap."

[[hook]]
name = "player.equipment_bonus"
kind = "filter"
doc  = "Fires at the return of the player's equipment bonus lookup. The filtered value is the computed bonus. ctx is { player, infusion, key }. Return the replacement value, or undefined to keep the current value."

[[hook]]
name = "player.heal_vfx"
kind = "guard"
doc  = "Fires at the top of play_heal_vfx(). ctx is { color, sprite }. Return false to veto the heal vfx. Undefined or true allows."

[[hook]]
name = "player.health_delta"
kind = "filter"
doc  = "Fires at the top of Ari.modify_health(), before the delta is applied. The filtered value is the signed health delta. ctx is { player, play_sound }. Return the replacement delta (0 makes the call a no-op), or undefined to keep the current value."

[[hook]]
name = "player.incoming_damage"
kind = "filter"
doc  = "Fires in the player's damage drain in obj_ari, after mitigation is applied. The filtered value is the final signed damage (health only changes while it is negative). ctx is { player, receiver, tarball }. Return the replacement damage or undefined to keep the current value. A combat.damage filter can set the ctx.tarball fields __mmapi_player_show_damage_popup and __mmapi_player_should_flinch to false to suppress the damage popup and flinch, and with both false and non-negative damage the hit is skipped entirely. mmapi_deal_damage()'s show_popup and flinch opts ride the same two fields."

[[hook]]
name = "player.max_health_item"
kind = "event"
doc  = "Fires right after an item's max_health_modifier raises ARI.base_health, before the vitals menu updates. ctx is { player, amount, live_item }."

[[hook]]
name = "player.move_speed"
kind = "filter"
doc  = "Fires at the end of the player's move speed computation, after the status effect multipliers. The filtered value is the speed. ctx is { player, on_mount }. Return the replacement speed, or undefined to keep the current value."

[[hook]]
name = "player.stamina_delta"
kind = "filter"
doc  = "Fires at the top of Ari.modify_stamina(), before stamina_costs_modifier is applied. The filtered value is the signed stamina delta. ctx is { player }. Return the replacement delta, or undefined to keep the current value."

[[hook]]
name = "player.status_effect_cancel"
kind = "event"
doc  = "Fires at the top of StatusEffectManager.cancel(), before the effect is looked up or removed. ctx is { type, manager }. Fires even when no such effect is active. Natural expiry does not route through cancel(); observe player.status_effect_expired for that."

[[hook]]
name = "player.status_effect_expired"
kind = "event"
doc  = "Fires in StatusEffectManager.update() when an effect's finish time lapses, right after the effect is removed from the manager. ctx is { type, effect, manager }: type is the StatusEffectId map key, effect is the removed struct ({ type, amount, start, finish, stacks, last_update }), manager is the StatusEffectManager. Disjoint from player.status_effect_cancel: natural expiry never calls cancel(), and cancel() never reaches this branch. The manager class is shared with monsters (par_monster), so monster-owned expiries fire too; compare ctx.manager against ARI.status_effects to scope to the player. The vitals HUD removes its icon on its own poll up to a frame later, so it may still be visible at emit time. Re-registering the effect from a handler is safe."

[[hook]]
name = "player.status_effect_register"
kind = "filter"
doc  = "Fires at the top of StatusEffectManager.register(). The filtered value is the struct { type, amount, start_time, finish_time, can_stack, show_hud }. ctx is the manager. Return the replacement struct. The seam tolerates an undefined return and re-reads each field defensively."

[[hook]]
name = "resource.node_modifier"
kind = "filter"
doc  = "Fires at the top of pick_node() and chop_node(), before the tool's modifier is applied to a resource node (rocks, forage, dig sites, trees, stumps). The filtered value is the tool modifier: the charged-tool bonus/penalty added to item.damage and to the item.quality gate. ctx is { grid, x, y, item, action }; action is \"pick\" or \"chop\". Return the replacement modifier (for example clamp a negative charged-tool penalty to 0 to remove the charged-attack damage penalty), or undefined to keep the current value."

[[hook]]
name = "save.game_loaded"
kind = "event"
doc  = "Fires at the start of loading a save, right after the save path is recorded. ctx is { save_path }."

[[hook]]
name = "save.game_saving"
kind = "event"
doc  = "Fires at the top of save_game(), after game.save_guard allows and the saver is created, before the save is written. ctx is { save_path }."

[[hook]]
name = "spells.can_cast"
kind = "override"
contention = "claim-scoped"
doc  = "Fires at the top of can_cast_spell(). ctx is the spell id. Return a non-undefined value to replace the entire can-cast result. Undefined defers to the normal checks."

[[hook]]
name = "spells.cast"
kind = "override"
contention = "claim-scoped"
doc  = "Fires at the top of cast_spell(). ctx is the spell id. Return any value other than undefined or false to consume the cast, skipping the engine cast and emitting spells.cast_done. Undefined defers to the engine cast (false also falls through, but still ends the override chain)."

[[hook]]
name = "spells.cast_done"
kind = "event"
doc  = "Fires when a spell cast completes: at the end of the engine's cast_spell(), and also when a spells.cast override consumes the cast. ctx is the spell id."

[[hook]]
name = "spells.cost"
kind = "filter"
doc  = "Fires wherever the engine reads a spell's mana cost: the can_cast_spell mana check, the spellcasting menu display, and the two mana deductions in the player's cast states (looping and default). The filtered value is SPELLS[spell].cost. ctx is the spell id. Return the replacement cost, or undefined to keep the current value."

[[hook]]
name = "ui.button_sprites"
kind = "filter"
doc  = "Fires when a button sprite set is built, just before it lands in BUTTON_SPRITE_CACHE. The filtered value is the built output. ctx is { key }, the cache key. Return the replacement output (the result is cached, so the filter runs once per key), or undefined to keep the current value."

[[hook]]
name = "ui.draw_gui"
kind = "event"
doc  = "Fires on every GUI draw, right after ANCHOR.on_draw_gui(). ctx is the display's asset_resize() value, the same argument on_draw_gui received."

[[hook]]
name = "ui.hud_should_show"
kind = "filter"
doc  = "Fires at the return of hud_should_show(). The filtered value is the computed boolean. ctx is undefined. Return the replacement boolean, or undefined to keep the current value."

[[hook]]
name = "ui.item_icon"
kind = "filter"
doc  = "Fires wherever an item icon sprite is resolved. ctx.source names the dispatch site: live_item (the generated wrapper around LiveItem.get_ui_icon, which every engine call site routes through, held and thrown sprites included) and obj_item_world (world item draw, where the value starts as get_world_icon() and may be undefined. The companion outline seam provides no dispatch of its own). The filtered value is the icon sprite. ctx is { item, source }. Return the replacement sprite, or undefined to keep the current value."

[[hook]]
name = "object.node_sprite"
kind = "filter"
doc  = "Fires at the top of obj_node_renderer.set_sprite(spr), before the sprite is assigned, for every world node the renderer draws (crops, forage, resource nodes). The filtered value is the sprite. ctx is the obj_node_renderer instance (read ctx.node for the node's prototype, day_count, and so on). Return the replacement sprite, or undefined to keep the current value."

[[hook]]
name = "ui.item_node"
kind = "filter"
in_place = true
doc  = "Fires when a UI item node is populated: in item_node.set_to_item() with the struct { node, item, count }, and in the crafting menu grid with { node, item, count, source: \"crafting_menu\" }. Both dispatch sites call mmapi_apply_filters and discard the return value, so handlers must mutate the ctx struct in place. The struct rides in the value position and the second argument is undefined."

[[hook]]
name = "ui.menu_closed"
kind = "event"
doc  = "Fires when a menu leaves ANCHOR.open_menus: in the per-frame free-requested drain, and per menu when the anchor shuts down and closes everything. ctx is { menu, kind }, with kind read from menu.type."

[[hook]]
name = "ui.menu_opened"
kind = "event"
doc  = "Fires right after ANCHOR spawns a menu and pushes it onto open_menus. ctx is { menu, kind }, with kind being the menu id passed to spawn."

[[hook]]
name = "store.item_added"
kind = "event"
doc  = "Fires in StoreMenu right after a shelf tap adds an item to the shopping basket (self.basket.add(item)), before the ghost and price update. ctx is { menu, item }: menu is the StoreMenu (menu.basket is the Inventory cart with .can_add(item)/.add(item), menu.update_prices() refreshes the totals), item is the LiveItem just added. Adding more from a handler via menu.basket.add does not re-fire this event (the emit is at the tap site, not at basket.add), so no re-entry guard is needed: a bulk-buy handler can add extra copies freely."

[[hook]]
name = "ui.menu_refreshed"
kind = "event"
doc  = "Fires after a menu rebuilds its content from game state, at the tail of the rebuild function. Emitting menus today: ToolbarMenu.update() (slot items re-resolved from the inventory: subscriber pull, page flips, tab taps, forced rebuilds, constructor) and VitalsMenu.refresh_statuses() (status icon strip rebuilt: register, cancel, and the expiry poll). ctx is { menu, kind }, with kind read from menu.type. Emits only on rebuild edges, never per idle frame, including during the menu's constructor before ui.menu_opened fires for it (ctx.menu is not yet in ANCHOR.open_menus then). Handlers must be idempotent and must not unconditionally force another rebuild from inside the handler."

[[hook]]
name = "ui.sprite"
kind = "filter"
doc  = "Fires at backplate sprite assignments. ctx.source names the site: mines_menu_backplate (the mines menu backplate on dungeon room start, ctx { source }) and spellcasting_card_backplate (the spell card backplate, ctx { source, spell }). The filtered value is the default backplate sprite. Return the replacement sprite, or undefined to keep the current value."

[[hook]]
name = "ui.toolbar_tick"
kind = "event"
doc  = "Fires every toolbar tick, after the subscriber pull and update and before press-and-hold processing. ctx is the ToolbarMenu."

