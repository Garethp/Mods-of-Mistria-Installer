# animal.pet emits from two sites in obj_player_animal so a mod can react whenever
# the player pets or puts down an animal. on_pet uses at=head (its body never
# touches the FSM, so a currency-dance celebration set up here survives the rest of
# the body); put_down uses at=after its last statement, because put_down's body
# changes the FSM to Wander and a head emit's celebration state would be clobbered.
[[seam]]
id      = "animal_on_pet"
file    = "gml/objects/obj_player_animal.gml"
target  = { fn = "on_pet", at = "head" }
op      = "emit"
hook    = "animal.pet"
ctx     = "self"
indent  = 16
marker  = "mmapi_animal_run_pet_on_pet"

[[seam]]
id      = "animal_put_down"
file    = "gml/objects/obj_player_animal.gml"
target  = { fn = "put_down", at = "after", anchor = "obj_ari.par.held_item_render_callback = undefined;" }
op      = "emit"
hook    = "animal.pet"
ctx     = "self"
indent  = 16
marker  = "mmapi_animal_run_pet_put_down"

# camera.culls_processed emits at the end of Camera.process_culls, right after instance_activate_region
# reactivates the in-view node renderers. A text seam (not target/at=after) because the anchor is the
# multi-line instance_activate_region(...) call: instance_activate_region is unique to this function,
# so the call + the closing brace anchor exactly once. Lets a mod refresh just-reactivated renderers
# before they draw (crop_timers re-skins badges), closing the 1-frame scroll-in lag the begin_step tick
# (which runs before this cull, Game.gml step_begin) leaves.
[[seam]]
id      = "camera_culls_processed"
file    = "gml/scripts/GameplaySystems/Camera/Camera.gml"
anchor  = '''
        instance_activate_region(
            region[0],
            region[1],
            region[2],
            region[3],
        );
    }'''
replace = '''
        instance_activate_region(
            region[0],
            region[1],
            region[2],
            region[3],
        );
        try { mmapi_emit("camera.culls_processed", self); } catch (__mmapi_camera_culls) {} // mmapi_camera_run_culls_processed
    }'''
marker  = "mmapi_camera_run_culls_processed"
provides = ["camera.culls_processed"]

# local_get is a native builtin (fabricator extension): the pristine tree has no
# GML body for it, so no template, target, text, or wrap form can reach inside
# it and a wrap has nothing to rename. The waist is created instead by
# redirecting every GML call site to the framework wrapper: 107 calls on 102
# lines across 35 files at catalog time, every one a direct single-argument
# call, none in member-access or reference position (verified against
# pristine). Token-matched: the identifier local_get immediately applied with
# an open paren; the distinct identifiers local_get_info, local_get_pronouns,
# and local_get_default_pronouns can never match. Applied after all
# [[seam]]/[[engine_fix]] edits so anchored seams keep matching pristine text;
# call tokens inside seam-injected text are rewritten too (correct semantics).
# scripts/mmapi/ is excluded from the rewrite so the wrapper's own native call
# survives. Zero handlers = behavioral (not byte) equivalence, the wrap
# tradeoff writ wide. In exchange, engine updates that add call sites are
# covered automatically.
[[call_rewrite]]
id       = "local_get_dispatch"
callee   = "local_get"
to       = "mmapi_local_get"
args     = 1
provides = ["local.get", "local.missing"]
